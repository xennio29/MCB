<div class="auth-container">
  <div class="logo-background">
      <img [src]="logo" class="bg-logo">
  </div>
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Inscription</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onRegister()" #registerForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Prénom</mat-label>
          <input matInput type="text" name="firstName" [(ngModel)]="firstName" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nom</mat-label>
          <input matInput type="text" name="lastName" [(ngModel)]="lastName" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required email>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" required minlength="6">
        </mat-form-field>

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" class="full-width" [disabled]="!registerForm.valid || loading">
          {{ loading ? 'Chargement...' : "S'inscrire" }}
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/login">Déjà un compte ? Se connecter</button>
    </mat-card-actions>
  </mat-card>
</div>
